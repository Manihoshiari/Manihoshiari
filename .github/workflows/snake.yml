name: Generate GitHub Contribution Snake

on:
  workflow_dispatch: # برای اجرای دستی
  schedule:
    - cron: "0 */12 * * *" # اجرا هر 12 ساعت، اختیاری

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1️⃣ checkout ریپو
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ ساخت SVG مار
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }} # از PAT استفاده کن

      # 3️⃣ push فایل‌ها به branch output
      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.3.0
        with:
          build_dir: dist
          target_branch: output
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }} # همان PAT
